<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPOTIF Admin - Push Notifications</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .admin-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 40px;
    }

    .admin-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .admin-header h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
    }

    .admin-header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    @media (max-width: 480px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .checkbox-group label {
      margin-bottom: 0;
      cursor: pointer;
      font-weight: 500;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 30px;
    }

    button {
      flex: 1;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-send {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-send:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-send:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-reset {
      background: #f0f0f0;
      color: #333;
    }

    .btn-reset:hover {
      background: #e0e0e0;
    }

    .alert {
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      animation: slideIn 0.3s ease;
    }

    .alert-success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
    }

    .alert-error {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
    }

    .alert-info {
      background: #d1ecf1;
      border: 1px solid #bee5eb;
      color: #0c5460;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .notification-preview {
      background: #f8f9fa;
      border: 2px dashed #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      margin-top: 20px;
    }

    .notification-preview h4 {
      margin: 0 0 12px 0;
      color: #333;
      font-size: 14px;
    }

    .preview-box {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
    }

    .preview-title {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .preview-body {
      color: #666;
      line-height: 1.4;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .stat-card {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <h1>🔔 SPOTIF Admin Dashboard</h1>
      <p>Kirim notifikasi push ke semua user</p>
    </div>

    <div id="alertContainer"></div>

    <form id="notificationForm">
      <!-- Authentication -->
      <div class="form-group">
        <label for="adminToken">🔐 Admin Token</label>
        <input 
          type="password" 
          id="adminToken" 
          placeholder="Masukkan admin token Anda"
          required
        >
      </div>

      <!-- Notification Title -->
      <div class="form-group">
        <label for="title">📢 Judul Notifikasi</label>
        <input 
          type="text" 
          id="title" 
          placeholder="Contoh: Fitur Baru SPOTIF!"
          required
          maxlength="65"
        >
        <small style="color: #999; margin-top: 4px; display: block;">Max 65 karakter</small>
      </div>

      <!-- Notification Body -->
      <div class="form-group">
        <label for="body">💬 Isi Notifikasi</label>
        <textarea 
          id="body" 
          placeholder="Tulis pesan notifikasi di sini..."
          required
          maxlength="240"
        ></textarea>
        <small style="color: #999; margin-top: 4px; display: block;">Max 240 karakter</small>
      </div>

      <!-- Additional Options -->
      <div class="form-row">
        <div class="form-group">
          <label for="tag">🏷️ Tag Notifikasi (Opsional)</label>
          <input 
            type="text" 
            id="tag" 
            placeholder="spotif-notification"
            value="spotif-notification"
          >
        </div>

        <div class="form-group">
          <label for="icon">🖼️ Icon URL (Opsional)</label>
          <input 
            type="text" 
            id="icon" 
            placeholder="/logo-512x512.png"
            value="/logo-512x512.png"
          >
        </div>
      </div>

      <!-- Require Interaction -->
      <div class="form-group">
        <div class="checkbox-group">
          <input type="checkbox" id="requireInteraction">
          <label for="requireInteraction">Wajib interaksi user (jangan auto-close)</label>
        </div>
      </div>

      <!-- Preview -->
      <div class="notification-preview">
        <h4>👁️ Preview Notifikasi:</h4>
        <div class="preview-box">
          <div class="preview-title" id="previewTitle">Judul Notifikasi</div>
          <div class="preview-body" id="previewBody">Isi pesan notifikasi akan muncul di sini...</div>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="submit" class="btn-send">
          <span id="btnText">📤 Kirim ke Semua User</span>
        </button>
        <button type="reset" class="btn-reset">🔄 Reset</button>
      </div>
    </form>

    <!-- Stats -->
    <div id="statsContainer" style="display: none;">
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Terkirim</div>
          <div class="stat-value" id="sentCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Gagal</div>
          <div class="stat-value" id="failureCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total</div>
          <div class="stat-value" id="totalCount">0</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('notificationForm');
    const alertContainer = document.getElementById('alertContainer');
    const statsContainer = document.getElementById('statsContainer');

    // Real-time preview
    document.getElementById('title').addEventListener('input', (e) => {
      document.getElementById('previewTitle').textContent = e.target.value || 'Judul Notifikasi';
    });

    document.getElementById('body').addEventListener('input', (e) => {
      document.getElementById('previewBody').textContent = e.target.value || 'Isi pesan notifikasi akan muncul di sini...';
    });

    // Form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('title').value;
      const body = document.getElementById('body').value;
      const adminToken = document.getElementById('adminToken').value;
      const tag = document.getElementById('tag').value;
      const icon = document.getElementById('icon').value;
      const requireInteraction = document.getElementById('requireInteraction').checked;

      // Validate
      if (!title.trim() || !body.trim()) {
        showAlert('❌ Judul dan isi notifikasi harus diisi!', 'error');
        return;
      }

      const submitBtn = form.querySelector('.btn-send');
      const originalText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Mengirim...';

      try {
        const response = await fetch(
          'https://your-backend-domain.vercel.app/api/notifications/send',
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${adminToken}`
            },
            body: JSON.stringify({
              title,
              body,
              icon,
              tag,
              requireInteraction
            })
          }
        );

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Gagal mengirim notifikasi');
        }

        showAlert(
          `✅ Notifikasi berhasil dikirim!\n` +
          `📤 Terkirim: ${data.stats.sent}\n` +
          `❌ Gagal: ${data.stats.failed}`,
          'success'
        );

        // Show stats
        document.getElementById('sentCount').textContent = data.stats.sent;
        document.getElementById('failureCount').textContent = data.stats.failed;
        document.getElementById('totalCount').textContent = data.stats.total;
        statsContainer.style.display = 'block';

        // Reset form
        form.reset();
        document.getElementById('previewTitle').textContent = 'Judul Notifikasi';
        document.getElementById('previewBody').textContent = 'Isi pesan notifikasi akan muncul di sini...';

      } catch (error) {
        showAlert(`❌ Error: ${error.message}`, 'error');
        console.error('Error:', error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
      }
    });

    function showAlert(message, type) {
      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.textContent = message;
      alertContainer.innerHTML = '';
      alertContainer.appendChild(alert);

      if (type !== 'error') {
        setTimeout(() => alert.remove(), 5000);
      }
    }
  </script>
</body>
</html>
