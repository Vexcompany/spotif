<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Admin Panel — Pagaska Music</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07071a;--s1:#0d0d24;--s2:#141438;--s3:#1a1a44;--s4:#202055;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.13);
  --tx:#eeeeff;--mt:#8888bb;
  --rd:#ff4d6d;--g:#1DB954;--g2:#1ed760;--p2:#9b7fe8;--yw:#ffa726;
  --nav-h:60px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 20% 0%,rgba(255,77,109,.07),transparent 60%),
             radial-gradient(ellipse 50% 40% at 80% 100%,rgba(124,92,191,.06),transparent 60%)}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;position:relative;z-index:1}
@media(max-width:768px){.app{grid-template-columns:1fr}.sidebar{display:none}}

/* ── SIDEBAR ── */
.sidebar{background:var(--s1);border-right:1px solid var(--bd);padding:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-brand{padding:20px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sb-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--rd),#c9184a);display:flex;align-items:center;justify-content:center;font-size:.95rem;color:#fff;flex-shrink:0;box-shadow:0 0 16px rgba(255,77,109,.3)}
.sb-name{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800}
.sb-sub{font-size:.6rem;color:var(--mt);margin-top:1px;letter-spacing:1px;text-transform:uppercase}
.sb-admin{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sb-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--rd),#c9184a);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;color:#fff;flex-shrink:0}
.sb-admin-name{font-size:.8rem;font-weight:600}
.sb-admin-role{font-size:.62rem;color:var(--rd)}
.sb-nav{padding:12px 10px;flex:1}
.sb-section{font-size:.58rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mt);padding:8px 10px 4px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all .2s;color:var(--mt);font-size:.8rem;font-weight:500;border:none;background:transparent;font-family:inherit;width:100%;text-align:left}
.sb-item:hover{background:var(--s2);color:var(--tx)}
.sb-item.active{background:rgba(255,77,109,.1);color:var(--rd);border:1px solid rgba(255,77,109,.2)}
.sb-item i{width:16px;text-align:center;font-size:.85rem}
.sb-badge{margin-left:auto;font-size:.6rem;background:var(--rd);color:#fff;padding:1px 7px;border-radius:20px;font-weight:700}
.sb-bottom{padding:14px 18px;border-top:1px solid var(--bd)}
.sb-bottom a{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--mt);text-decoration:none;padding:8px;border-radius:9px;transition:all .2s}
.sb-bottom a:hover{background:var(--s2);color:var(--tx)}

/* ── MAIN ── */
.main{padding:0;overflow-x:hidden}
.topbar{position:sticky;top:0;z-index:50;background:rgba(7,7,26,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.topbar-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;display:flex;align-items:center;gap:10px}
.topbar-title i{color:var(--rd)}
.topbar-right{display:flex;align-items:center;gap:8px}
.tb-btn{padding:7px 14px;border-radius:9px;border:1px solid var(--bd);background:var(--s2);color:var(--mt);font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:6px}
.tb-btn:hover{background:var(--s3);color:var(--tx)}
.tb-btn.danger{border-color:rgba(255,77,109,.3);color:var(--rd)}
.tb-btn.danger:hover{background:rgba(255,77,109,.1)}

.content{padding:20px 24px}
@media(max-width:768px){.content{padding:14px}}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:16px;display:flex;align-items:center;gap:12px}
.stat-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.stat-ico.green{background:rgba(29,185,84,.12);color:var(--g);border:1px solid rgba(29,185,84,.2)}
.stat-ico.red{background:rgba(255,77,109,.12);color:var(--rd);border:1px solid rgba(255,77,109,.2)}
.stat-ico.purple{background:rgba(124,92,191,.12);color:var(--p2);border:1px solid rgba(124,92,191,.2)}
.stat-ico.yellow{background:rgba(255,167,38,.12);color:var(--yw);border:1px solid rgba(255,167,38,.2)}
.stat-num{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800}
.stat-lbl{font-size:.65rem;color:var(--mt);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* ── PANELS ── */
.panel{display:none}.panel.active{display:block}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.panel-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;display:flex;align-items:center;gap:8px}
.panel-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ── SEARCH BAR ── */
.search-bar{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:8px 12px;margin-bottom:14px}
.search-bar i{color:var(--mt);font-size:.8rem;flex-shrink:0}
.search-bar input{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-size:.82rem;font-family:inherit}
.search-bar input::placeholder{color:var(--mt)}

/* ── TABLE ── */
.tbl-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.tbl-item{display:grid;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd);transition:background .18s}
.tbl-item:last-child{border-bottom:none}
.tbl-item:hover{background:var(--s2)}
.tbl-tracks{grid-template-columns:40px 1fr auto auto}
.tbl-party{grid-template-columns:40px 1fr auto auto}
.tbl-head{background:var(--s2);border-bottom:1px solid var(--bd2)!important;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mt);cursor:default}
.tbl-head:hover{background:var(--s2)!important}
.tbl-thumb{width:40px;height:40px;border-radius:8px;overflow:hidden;flex-shrink:0}
.tbl-thumb img{width:100%;height:100%;object-fit:cover}
.tbl-info{min-width:0}
.tbl-title{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.tbl-meta{font-size:.68rem;color:var(--mt);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tbl-badge{font-size:.58rem;padding:2px 7px;border-radius:6px;font-weight:700}
.badge-storage{background:rgba(29,185,84,.12);color:var(--g);border:1px solid rgba(29,185,84,.2)}
.badge-nexray{background:rgba(61,142,248,.12);color:#6aabff;border:1px solid rgba(61,142,248,.2)}
.badge-preview{background:rgba(255,167,38,.12);color:var(--yw);border:1px solid rgba(255,167,38,.2)}
.tbl-plays{font-size:.75rem;font-weight:700;color:var(--g);text-align:center;white-space:nowrap}
.tbl-actions{display:flex;gap:4px;justify-content:flex-end}
.act-btn{width:30px;height:30px;border-radius:8px;border:none;background:transparent;color:var(--mt);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:all .2s}
.act-btn:hover{background:var(--s3);color:var(--tx)}
.act-btn.del:hover{background:rgba(255,77,109,.15);color:var(--rd)}
.act-btn.play:hover{background:rgba(29,185,84,.15);color:var(--g)}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:var(--mt);font-size:.82rem}
.empty i{font-size:2rem;display:block;margin-bottom:10px;opacity:.3}
.spin{animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── CONFIRM MODAL ── */
.modal-bg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{width:100%;max-width:340px;background:var(--s2);border:1px solid var(--bd2);border-radius:18px;padding:24px 20px;box-shadow:0 24px 60px rgba(0,0,0,.8);animation:mIn .25s cubic-bezier(.16,1,.3,1)}
@keyframes mIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.modal-ico{width:48px;height:48px;border-radius:14px;background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.25);color:var(--rd);display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin:0 auto 12px}
.modal h3{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;text-align:center;margin-bottom:6px}
.modal p{font-size:.78rem;color:var(--mt);text-align:center;margin-bottom:16px;line-height:1.6}
.modal-track{font-weight:700;color:var(--tx);display:block;margin-top:4px}
.modal-btns{display:flex;gap:8px}
.btn-cancel{flex:1;padding:10px;border-radius:10px;border:1px solid var(--bd);background:var(--s3);color:var(--mt);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-cancel:hover{background:var(--s4);color:var(--tx)}
.btn-del{flex:1;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--rd),#c9184a);color:#fff;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-del:hover{transform:scale(1.02);box-shadow:0 4px 16px rgba(255,77,109,.4)}
.btn-del:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--s3);color:var(--tx);padding:8px 18px;border-radius:10px;font-size:.78rem;border:1px solid var(--bd2);opacity:0;transition:all .25s;z-index:9999;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MOBILE NAV ── */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(7,7,26,.97);backdrop-filter:blur(16px);border-top:1px solid var(--bd);padding:8px;z-index:100}
@media(max-width:768px){.mobile-nav{display:flex;justify-content:space-around}}
.mn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;border-radius:10px;cursor:pointer;font-size:.55rem;font-weight:600;color:var(--mt);border:none;background:transparent;font-family:inherit;transition:all .2s;text-transform:uppercase;letter-spacing:.5px}
.mn-item i{font-size:1.1rem}
.mn-item.active{color:var(--rd)}
@media(max-width:768px){.content{padding-bottom:80px}}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo"><i class="fas fa-shield-halved"></i></div>
      <div>
        <div class="sb-name">Admin Panel</div>
        <div class="sb-sub">Pagaska Music</div>
      </div>
    </div>
    <div class="sb-admin">
      <div class="sb-av" id="sbAv">A</div>
      <div>
        <div class="sb-admin-name" id="sbName">Admin</div>
        <div class="sb-admin-role">Administrator</div>
      </div>
    </div>
    <nav class="sb-nav">
      <div class="sb-section">Kelola</div>
      <button class="sb-item active" id="nav-tracks" onclick="showPanel('tracks')">
        <i class="fas fa-music"></i> Lagu (Beranda)
        <span class="sb-badge" id="tracksBadge">–</span>
      </button>
      <button class="sb-item" id="nav-party" onclick="showPanel('party')">
        <i class="fas fa-users"></i> Party Queue
        <span class="sb-badge" id="partyBadge">–</span>
      </button>
      <div class="sb-section">Info</div>
      <button class="sb-item" id="nav-stats" onclick="showPanel('stats')">
        <i class="fas fa-chart-bar"></i> Statistik
      </button>
    </nav>
    <div class="sb-bottom">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Kembali ke Player</a>
      <a href="#" onclick="doLogout()" style="color:var(--rd)"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title"><i class="fas fa-shield-halved"></i> <span id="panelTitle">Kelola Lagu</span></div>
      <div class="topbar-right">
        <button class="tb-btn" onclick="refreshAll()"><i class="fas fa-sync-alt"></i> Refresh</button>
        <button class="tb-btn danger" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>

    <div class="content">

      <!-- STAT CARDS -->
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-ico green"><i class="fas fa-music"></i></div>
          <div><div class="stat-num" id="sc-tracks">–</div><div class="stat-lbl">Total Lagu</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-ico purple"><i class="fas fa-list"></i></div>
          <div><div class="stat-num" id="sc-party">–</div><div class="stat-lbl">Party Queue</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-ico red"><i class="fas fa-headphones"></i></div>
          <div><div class="stat-num" id="sc-plays">–</div><div class="stat-lbl">Total Putar</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-ico yellow"><i class="fas fa-database"></i></div>
          <div><div class="stat-num" id="sc-storage">–</div><div class="stat-lbl">Di Storage</div></div>
        </div>
      </div>

      <!-- PANEL: TRACKS -->
      <div class="panel active" id="panel-tracks">
        <div class="panel-head">
          <div class="panel-title"><i class="fas fa-music" style="color:var(--g)"></i> Lagu di Beranda</div>
          <div class="panel-actions">
            <button class="tb-btn danger" onclick="clearAllTracks()"><i class="fas fa-trash-alt"></i> Hapus Semua</button>
          </div>
        </div>
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="trackSearch" placeholder="Cari judul atau artis..." oninput="filterTracks()">
        </div>
        <div class="tbl-wrap" id="tracksList">
          <div class="empty"><i class="fas fa-circle-notch spin"></i>Memuat...</div>
        </div>
      </div>

      <!-- PANEL: PARTY QUEUE -->
      <div class="panel" id="panel-party">
        <div class="panel-head">
          <div class="panel-title"><i class="fas fa-users" style="color:var(--p2)"></i> Party Queue</div>
          <div class="panel-actions">
            <button class="tb-btn danger" onclick="clearPartyQueue()"><i class="fas fa-trash-alt"></i> Kosongkan Queue</button>
          </div>
        </div>
        <div class="tbl-wrap" id="partyList">
          <div class="empty"><i class="fas fa-circle-notch spin"></i>Memuat...</div>
        </div>
      </div>

      <!-- PANEL: STATS -->
      <div class="panel" id="panel-stats">
        <div class="panel-title" style="margin-bottom:16px"><i class="fas fa-chart-bar" style="color:var(--yw)"></i> Statistik Detail</div>
        <div class="tbl-wrap" id="statsContent">
          <div class="empty"><i class="fas fa-circle-notch spin"></i>Memuat...</div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MOBILE NAV -->
<nav class="mobile-nav">
  <button class="mn-item active" id="mn-tracks" onclick="showPanel('tracks')"><i class="fas fa-music"></i>Lagu</button>
  <button class="mn-item" id="mn-party" onclick="showPanel('party')"><i class="fas fa-users"></i>Party</button>
  <button class="mn-item" id="mn-stats" onclick="showPanel('stats')"><i class="fas fa-chart-bar"></i>Stats</button>
  <button class="mn-item" onclick="window.location.href='index.html'"><i class="fas fa-home"></i>Player</button>
</nav>

<!-- CONFIRM MODAL -->
<div class="modal-bg" id="confirmModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-ico"><i class="fas fa-trash-alt"></i></div>
    <h3>Hapus?</h3>
    <p id="modalMsg">–<span class="modal-track" id="modalTrack"></span></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-del" id="modalConfirmBtn"><i class="fas fa-trash-alt"></i> Hapus</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const SB_URL = 'https://ygwoddwdhelqcwhpqasl.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlnd29kZHdkaGVscWN3aHBxYXNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTEwNzcsImV4cCI6MjA4NzQyNzA3N30.y0tnci0aWnhWYpxb9v7M7I0X9ss-jAt0JvpOBnZgFzo';
const ADMIN_KEY = 'pgsk_admin_session';
const PH = 'https://placehold.co/40x40/0d0d24/1DB954?text=♪';

const HDR = {
  'Content-Type':'application/json',
  apikey: SB_KEY,
  Authorization: 'Bearer ' + SB_KEY
};

// ── AUTH CHECK ────────────────────────────────────────────────
const adminSess = JSON.parse(localStorage.getItem(ADMIN_KEY) || 'null');
if(!adminSess || !adminSess.isAdmin){
  window.location.href = 'admin.html';
}
const adminName = adminSess?.nama || 'Admin';
const ini = adminName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
document.getElementById('sbAv').textContent  = ini;
document.getElementById('sbName').textContent = adminName;

function doLogout(){
  localStorage.removeItem(ADMIN_KEY);
  window.location.href = 'admin.html';
}

// ── SUPABASE HELPERS ──────────────────────────────────────────
async function sb_get(table, query=''){
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, { headers: HDR });
  return r.json();
}
async function sb_del(table, query){
  return fetch(`${SB_URL}/rest/v1/${table}?${query}`, { method:'DELETE', headers: HDR });
}

// ── DATA ──────────────────────────────────────────────────────
let allTracks = [], allParty = [];

async function loadTracks(){
  document.getElementById('tracksList').innerHTML = '<div class="empty"><i class="fas fa-circle-notch spin"></i>Memuat...</div>';
  try{
    allTracks = await sb_get('tracks', 'order=last_played.desc.nullslast&limit=200');
    renderTracks(allTracks);
    document.getElementById('sc-tracks').textContent = allTracks.length;
    document.getElementById('tracksBadge').textContent = allTracks.length;
    const totalPlays = allTracks.reduce((a,b)=>a+(b.play_count||0),0);
    document.getElementById('sc-plays').textContent = totalPlays;
    const withStorage = allTracks.filter(t=>t.audio_url?.includes('supabase')).length;
    document.getElementById('sc-storage').textContent = withStorage;
  }catch(e){
    document.getElementById('tracksList').innerHTML = `<div class="empty"><i class="fas fa-exclamation-triangle"></i>${e.message}</div>`;
  }
}

function renderTracks(tracks){
  const el = document.getElementById('tracksList');
  if(!tracks.length){
    el.innerHTML = '<div class="empty"><i class="fas fa-music"></i>Belum ada lagu</div>';
    return;
  }
  el.innerHTML = `
    <div class="tbl-item tbl-tracks tbl-head">
      <div></div><div>Lagu</div><div style="text-align:center">Putar</div><div>Aksi</div>
    </div>
  ` + tracks.map(t => {
    const srcBadge = t.audio_url?.includes('supabase')
      ? '<span class="tbl-badge badge-storage">Storage</span>'
      : t.audio_url?.includes('itunes')
      ? '<span class="tbl-badge badge-preview">Preview</span>'
      : '<span class="tbl-badge badge-nexray">Nexray</span>';
    const lastPlay = t.last_played
      ? new Date(t.last_played).toLocaleDateString('id-ID',{day:'numeric',month:'short'})
      : '–';
    return `<div class="tbl-item tbl-tracks">
      <div class="tbl-thumb"><img src="${t.thumbnail||PH}" onerror="this.src='${PH}'" loading="lazy"></div>
      <div class="tbl-info">
        <div class="tbl-title">${t.title||'–'}</div>
        <div class="tbl-meta">${t.artist||'–'} ${srcBadge} <span>${lastPlay}</span></div>
      </div>
      <div class="tbl-plays">${t.play_count||0}×</div>
      <div class="tbl-actions">
        ${t.audio_url ? `<button class="act-btn play" onclick="previewTrack('${encodeURIComponent(t.audio_url||'')}')" title="Preview"><i class="fas fa-play"></i></button>` : ''}
        <button class="act-btn del" onclick="confirmDeleteTrack('${t.id}','${(t.title||'').replace(/'/g,'\\\'')}')" title="Hapus"><i class="fas fa-trash-alt"></i></button>
      </div>
    </div>`;
  }).join('');
}

function filterTracks(){
  const q = document.getElementById('trackSearch').value.toLowerCase();
  if(!q){ renderTracks(allTracks); return; }
  renderTracks(allTracks.filter(t =>
    (t.title||'').toLowerCase().includes(q) ||
    (t.artist||'').toLowerCase().includes(q)
  ));
}

async function loadParty(){
  document.getElementById('partyList').innerHTML = '<div class="empty"><i class="fas fa-circle-notch spin"></i>Memuat...</div>';
  try{
    allParty = await sb_get('party_queue', 'played=eq.false&order=added_at.asc&limit=100');
    renderParty(allParty);
    document.getElementById('sc-party').textContent = allParty.length;
    document.getElementById('partyBadge').textContent = allParty.length;
  }catch(e){
    document.getElementById('partyList').innerHTML = `<div class="empty"><i class="fas fa-exclamation-triangle"></i>${e.message}</div>`;
  }
}

function renderParty(items){
  const el = document.getElementById('partyList');
  if(!items.length){
    el.innerHTML = '<div class="empty"><i class="fas fa-list"></i>Party queue kosong</div>';
    return;
  }
  el.innerHTML = `
    <div class="tbl-item tbl-party tbl-head">
      <div></div><div>Lagu</div><div>Ditambah</div><div>Aksi</div>
    </div>
  ` + items.map((t,i) => {
    const by = (t.added_by||'').split('_').slice(0,-1).join(' ') || t.added_by || '–';
    const time = t.added_at ? new Date(t.added_at).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}) : '–';
    return `<div class="tbl-item tbl-party">
      <div class="tbl-thumb"><img src="${t.thumbnail||PH}" onerror="this.src='${PH}'" loading="lazy"></div>
      <div class="tbl-info">
        <div class="tbl-title">${t.title||'–'}</div>
        <div class="tbl-meta">${t.artist||'–'} · <span style="color:var(--p2)">${by}</span></div>
      </div>
      <div style="font-size:.72rem;color:var(--mt);white-space:nowrap">${time}</div>
      <div class="tbl-actions">
        <button class="act-btn del" onclick="confirmDeleteParty('${t.id}','${(t.title||'').replace(/'/g,'\\\'')}')" title="Hapus dari queue"><i class="fas fa-times"></i></button>
      </div>
    </div>`;
  }).join('');
}

async function loadStats(){
  try{
    const top = [...allTracks].sort((a,b)=>(b.play_count||0)-(a.play_count||0)).slice(0,10);
    const el = document.getElementById('statsContent');
    if(!top.length){ el.innerHTML='<div class="empty"><i class="fas fa-chart-bar"></i>Belum ada data</div>'; return; }
    el.innerHTML = top.map((t,i) => `
      <div class="tbl-item" style="grid-template-columns:24px 40px 1fr auto;gap:10px;display:grid;align-items:center">
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:.9rem;color:${i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'var(--mt)'};text-align:center">${i+1}</div>
        <div class="tbl-thumb"><img src="${t.thumbnail||PH}" onerror="this.src='${PH}'"></div>
        <div class="tbl-info">
          <div class="tbl-title">${t.title||'–'}</div>
          <div class="tbl-meta">${t.artist||'–'}</div>
        </div>
        <div class="tbl-plays">${t.play_count||0}×</div>
      </div>
    `).join('');
  }catch(e){}
}

// ── ACTIONS ──────────────────────────────────────────────────
let pendingDelete = null;

function confirmDeleteTrack(id, title){
  pendingDelete = { type:'track', id, title };
  document.getElementById('modalMsg').innerHTML = 'Hapus lagu ini secara permanen?';
  document.getElementById('modalTrack').textContent = title;
  document.getElementById('modalConfirmBtn').onclick = doDeleteTrack;
  document.getElementById('confirmModal').classList.add('open');
}

async function doDeleteTrack(){
  if(!pendingDelete) return;
  const btn = document.getElementById('modalConfirmBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch spin"></i>';
  try{
    await sb_del('tracks', `id=eq.${encodeURIComponent(pendingDelete.id)}`);
    toast('🗑️ Lagu dihapus!');
    closeModal();
    loadTracks();
  }catch(e){ toast('❌ Gagal: '+e.message); }
  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-trash-alt"></i> Hapus';
}

function confirmDeleteParty(id, title){
  pendingDelete = { type:'party', id, title };
  document.getElementById('modalMsg').innerHTML = 'Hapus dari party queue?';
  document.getElementById('modalTrack').textContent = title;
  document.getElementById('modalConfirmBtn').onclick = doDeleteParty;
  document.getElementById('confirmModal').classList.add('open');
}

async function doDeleteParty(){
  if(!pendingDelete) return;
  const btn = document.getElementById('modalConfirmBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch spin"></i>';
  try{
    await sb_del('party_queue', `id=eq.${encodeURIComponent(pendingDelete.id)}`);
    toast('🗑️ Dihapus dari queue!');
    closeModal();
    loadParty();
  }catch(e){ toast('❌ Gagal: '+e.message); }
  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-trash-alt"></i> Hapus';
}

async function clearPartyQueue(){
  if(!confirm('Kosongkan seluruh party queue?')) return;
  try{
    await sb_del('party_queue', 'played=eq.false');
    toast('✅ Party queue dikosongkan!');
    loadParty();
  }catch(e){ toast('❌ Gagal: '+e.message); }
}

async function clearAllTracks(){
  if(!confirm('HAPUS SEMUA LAGU dari database? Ini tidak bisa dibatalkan!')) return;
  if(!confirm('Yakin? Semua data lagu akan hilang!')) return;
  try{
    await fetch(`${SB_URL}/rest/v1/tracks?id=neq.null`, { method:'DELETE', headers: HDR });
    toast('✅ Semua lagu dihapus!');
    loadTracks();
  }catch(e){ toast('❌ Gagal: '+e.message); }
}

function previewTrack(encodedUrl){
  const url = decodeURIComponent(encodedUrl);
  const a = new Audio(url);
  a.volume = 0.5;
  a.play().catch(()=>toast('⚠️ Tidak bisa preview'));
  toast('▶ Preview...');
  setTimeout(()=>a.pause(), 8000);
}

// ── PANELS ────────────────────────────────────────────────────
const panels = ['tracks','party','stats'];
function showPanel(name){
  panels.forEach(p=>{
    document.getElementById(`panel-${p}`).classList.toggle('active', p===name);
    document.getElementById(`nav-${p}`)?.classList.toggle('active', p===name);
    document.getElementById(`mn-${p}`)?.classList.toggle('active', p===name);
  });
  const titles = { tracks:'Kelola Lagu', party:'Party Queue', stats:'Statistik' };
  document.getElementById('panelTitle').textContent = titles[name] || name;
  if(name==='stats') loadStats();
}

function refreshAll(){
  loadTracks();
  loadParty();
  toast('🔄 Diperbarui!');
}

// ── MODAL ─────────────────────────────────────────────────────
function closeModal(e){
  if(e&&e.target!==document.getElementById('confirmModal')) return;
  document.getElementById('confirmModal').classList.remove('open');
  pendingDelete = null;
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

// ── TOAST ─────────────────────────────────────────────────────
let toastT;
function toast(m){
  const el = document.getElementById('toast');
  el.textContent = m;
  el.classList.add('on');
  clearTimeout(toastT);
  toastT = setTimeout(()=>el.classList.remove('on'), 3000);
}

// ── INIT ──────────────────────────────────────────────────────
loadTracks();
loadParty();
</script>
</body>
</html>
